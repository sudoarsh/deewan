---
layout: default
---
    <div class="container">
        <h2>Deewan Witnesses</h2>
        <div class="controls">
            <span class="control-label">Select Witnesses:</span>
            <label><input type="checkbox" class="col-toggle" value="BL" checked> BL (1799)</label>
            <label><input type="checkbox" class="col-toggle" value="TO" checked> TO (1811)</label>
            <label><input type="checkbox" class="col-toggle" value="SJ" checked> SJ (1818)</label>
            <label><input type="checkbox" class="col-toggle" value="GM" checked> GM (Print)</label>
        </div>
        <div class="table-wrapper">
            <table id="deewanTable">
                <thead>
                    <tr>
                        <th class="id-col">ID</th>
                        <th class="col-BL">BL</th>
                        <th class="col-TO">TO</th>
                        <th class="col-SJ">SJ</th>
                        <th class="col-GM">GM (Base)</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
    <script src="data.js"></script>
    <script src="script.js"></script>
